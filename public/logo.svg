<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
  <defs>
    <!-- Ultra-Vibrant Glowing Gradient for the Background Plate -->
    <linearGradient id="vibrantFbtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Soft, high-contrast drop shadow for letters -->
    <filter id="highContrastShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="0.6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Vibrant Squircle Background Plate (High-Contrast Gradient) -->
  <rect width="24" height="24" rx="6.5" fill="url(#vibrantFbtGrad)" />
  
  <!-- Subtle inner white highlights for 3D premium glass feel -->
  <rect x="0.5" y="0.5" width="23" height="23" rx="6" fill="none" stroke="rgba(255, 255, 255, 0.28)" stroke-width="0.75" />

  <!-- Ultra-Clean, High-Contrast Tilted Monogram (Anchored and Cradled) -->
  <g filter="url(#highContrastShadow)">
    
    <!-- Sleek Horizontal Baseline (Cradles and unifies the letters) -->
    <path d="M6 17 H18" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Letter F (Tilted -28 degrees, anchored at the bottom stem 8, 16) -->
    <g transform="rotate(-28, 8, 16)">
      <path d="M8 8 V16" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 8 H11" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 11.5 H10" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Letter B (Perfectly Upright 90 degrees, centered at 12, 16) -->
    <g transform="rotate(0, 12, 16)">
      <path d="M11 8 V16" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M11 8 H12.5 C13.5 8 14 9.2 14 9.8 C14 10.4 13.5 11.2 12.5 11.2 H11" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M11 11.2 H12.5 C13.5 11.2 14 12.6 14 13.2 C14 13.8 13.5 16 12.5 16 H11" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Letter T (Tilted 28 degrees, anchored at the bottom stem 16, 16) -->
    <g transform="rotate(28, 16, 16)">
      <path d="M14 8 H18" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M16 8 V16" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
  </g>
</svg>
